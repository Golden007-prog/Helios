name: PR — lint + test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

# Test files are gitignored per the team policy at .gitignore §"Per team
# decision: test files do not ship to GitHub. They still run locally..."
# (lines 253-274). The CI test steps below probe for tests on the checkout
# and skip with a notice when none are present, so the pipeline stays
# green and would re-engage automatically if the policy is later flipped.

jobs:
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install deps
        run: pip install -e "backend[dev]"
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Format check (ruff)
        working-directory: backend
        run: ruff format --check .
      - name: Type check (mypy)
        working-directory: backend
        run: mypy app
      - name: Tests (pytest, when tests are present)
        working-directory: backend
        run: |
          if compgen -G "tests/test_*.py" > /dev/null; then
            pytest --cov=app --cov-report=xml
          else
            echo "::notice::backend/tests/ is gitignored — skipping pytest (run locally with 'cd backend && pytest')"
          fi
      - uses: actions/upload-artifact@v4
        if: always() && hashFiles('backend/coverage.xml') != ''
        with:
          name: backend-coverage
          path: backend/coverage.xml

  mcp-servers:
    name: MCP servers (smoke tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -e "mcp-servers[dev]"
      - name: Lint + tests (when present)
        working-directory: mcp-servers
        run: |
          ruff check .
          if compgen -G "*/tests/test_*.py" > /dev/null || compgen -G "tests/test_*.py" > /dev/null; then
            pytest
          else
            echo "::notice::mcp-servers/tests gitignored — skipping pytest"
          fi

  shared-codegen:
    name: Shared — typegen up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: pip install -e "backend[dev]"
      - run: cd frontend && (npm ci --legacy-peer-deps || npm install --legacy-peer-deps)
      - name: Run typegen
        run: |
          python -m shared.codegen.dump_openapi
          python -m shared.codegen.pydantic_to_typescript
          python -m shared.codegen.dump_constants
      - name: Fail if generated files changed
        run: |
          git diff --exit-code -- shared/schemas frontend/src/lib/api/types.gen.ts frontend/src/lib/api/constants.gen.ts \
            || (echo "::error::generated files are stale — run \`make typegen\`" && exit 1)

  frontend:
    name: Frontend (typecheck + lint + vitest)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - name: Vitest (when tests are present)
        run: |
          # vitest fails with exit 1 when zero test files are discovered.
          # The team policy gitignores test files; skip cleanly when none
          # are present in the checkout.
          if compgen -G "src/**/*.test.ts*" > /dev/null 2>&1 || \
             find src -name "*.test.ts" -o -name "*.test.tsx" 2>/dev/null | grep -q .; then
            npm test
          else
            echo "::notice::frontend test files gitignored — skipping vitest"
          fi
        shell: bash
