name: Frontend — deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "shared/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: frontend-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      # @storybook/nextjs has a strict peer-dep on @storybook/react=8.6.18
      # while package.json lists ^8.3.5, which npm@10 refuses to reconcile
      # without --legacy-peer-deps. Same pattern in pr.yml.
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - name: Build static export
        env:
          GITHUB_PAGES: "true"
          PAGES_BASE_PATH: /Helios
          # MSW stays default-on so the deployed Pages site demos the full
          # 62 -> 94 -> 100 trajectory + four hero shots without depending on
          # a publicly-reachable backend. Set repo variable HELIOS_USE_MSW
          # to "false" to bake real API calls instead.
          NEXT_PUBLIC_USE_MSW: ${{ vars.HELIOS_USE_MSW || 'true' }}
          # Baked into the bundle for the case where MSW is bypassed at
          # runtime. Set repo variable HELIOS_BACKEND_URL to the public
          # backend URL when one exists; otherwise the default routes API
          # calls to the local Docker container on the demo machine.
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.HELIOS_BACKEND_URL || 'http://localhost:8081' }}
        run: npm run build
      - name: Add .nojekyll
        run: touch out/.nojekyll
      - name: Install SPA fallback 404.html
        # Next's static export writes its own ``404.html`` from the default
        # not-found page, overwriting whatever was in ``public/``. Restore
        # the SPA bootloader so unknown deep links (e.g. runtime IDs from
        # MSW) bounce through ``/Helios/?p=/<path>`` and the layout
        # snippet rewrites the URL on the client.
        run: cp public/404.html out/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
