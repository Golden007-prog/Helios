repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(backend|mcp-servers|shared)/
      - id: ruff-format
        files: ^(backend|mcp-servers|shared)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^backend/app/
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.4
          - types-PyYAML

  - repo: local
    hooks:
      - id: lint-audit-calls
        name: every state-changing endpoint must call audit.write_event
        entry: python tools/lint_audit_calls.py
        language: system
        pass_filenames: false
        files: ^backend/app/api/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^(frontend|shared)/
        types_or: [ts, tsx, css, json, markdown]
        additional_dependencies:
          - prettier@3.3.3
          - prettier-plugin-tailwindcss@0.6.8

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.10.0
    hooks:
      - id: eslint
        files: ^frontend/src/.*\.(ts|tsx)$
        additional_dependencies:
          - eslint@8.57.1
          - eslint-config-next@14.2.15
          - eslint-config-prettier@9.1.0
          - typescript@5.6.3
