# BankDemo integration test — VSAM backend.
# Source: 01_BankDemo/scripts/config/env.json + test overrides.
# This is Maya's "promote from" region for the hero scenario.
name: bnk_test_vsam
tier: integration
hlq: MFI01T.MFIDEMO
db2:
  subsystem_id: DB10
  plan_collection: MFIDEMO_T
  default_bind:
    isolation: CS
    acquire: USE
    release: COMMIT
racf_group: BNKDEV
jes:
  class: T
  sysout_class: X
scheduler_queue: BATCH_TEST
volser_pattern: TST*
gdg_retention: 5
protected_resources:
  - BNKACC
  - BNKCUST
  - BNKTXN
  - BNKHELP
  - BNKATYPE
confidence_weight_overrides: {}
review:
  auto_approve_threshold: 90
gating:
  override_required_role: developer
source_pack: bankdemo
language_scope: [cobol, pli]
storage_backend: vsam
proclibs: [bankdemo_proclib]
copylibs: [bankdemo_copylib]
description: BankDemo integration test, VSAM backend; source region for the ZBNKDEL.jcl hero promote.
